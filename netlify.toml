[build]
  publish = "."
  functions = "netlify/functions"

# Route /api/claude to the serverless function
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache HTML with short TTL so updates deploy fast
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
