name: Vercel — Set Best Available Alias

on:
  workflow_dispatch:
    inputs:
      vercel_token:
        description: 'Vercel Token'
        required: true
        type: string

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Try aliases in priority order
        run: |
          SOURCE="lumina-kappa-topaz.vercel.app"
          CANDIDATES=(
            "lumina.vercel.app"
            "getlumina.vercel.app"
            "lumina-app.vercel.app"
            "lumina-pwa.vercel.app"
            "thelumina.vercel.app"
            "lumina-ai.vercel.app"
          )
          for ALIAS in "${CANDIDATES[@]}"; do
            echo "Trying: $ALIAS"
            if npx vercel alias set "$SOURCE" "$ALIAS" --token "${{ github.event.inputs.vercel_token }}" --yes 2>&1; then
              echo "SUCCESS: https://$ALIAS"
              exit 0
            fi
            echo "Unavailable: $ALIAS"
          done
          exit 1
