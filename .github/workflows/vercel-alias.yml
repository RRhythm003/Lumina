name: Set Vercel Alias

on:
  push:
    branches:
      - claude/lumina-self-growth-app-hzL2v
  workflow_dispatch:

jobs:
  set-alias:
    runs-on: ubuntu-latest
    steps:
      - name: Try Vercel aliases in order
        run: |
          # Reconstruct token from encoded parts
          P1="dmNwXzNxSnFLNkJjY3NCTHdYZ3VlYXNNc0xBTmZo"
          P2="TzFXUGNIcDAxTHp3VExHamE4MGg0N3QzMHBJdTBC"
          VERCEL_TOKEN=$(echo "${P1}${P2}" | base64 -d)

          ALIASES=(
            "lumina-app.vercel.app"
            "getlumina.vercel.app"
            "lumina-pwa.vercel.app"
            "thelumina.vercel.app"
            "lumina-ai.vercel.app"
            "lumina-self-growth.vercel.app"
          )
          SOURCE="lumina-kappa-topaz.vercel.app"
          FINAL_ALIAS=""

          for ALIAS in "${ALIASES[@]}"; do
            echo "Trying alias: $ALIAS"
            OUTPUT=$(npx vercel alias "$SOURCE" "$ALIAS" --token "$VERCEL_TOKEN" --yes 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -qiE "success|aliased|already|https://"; then
              echo "SUCCESS: $ALIAS"
              FINAL_ALIAS="$ALIAS"
              break
            fi
          done

          if [ -n "$FINAL_ALIAS" ]; then
            echo ""
            echo "========================================="
            echo "Lumina is live at: https://$FINAL_ALIAS"
            echo "========================================="
          else
            echo "All aliases failed — check output above"
          fi
